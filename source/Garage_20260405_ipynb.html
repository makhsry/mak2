<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notebook — Python in Browser</title>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <!-- ✅ The missing piece: auto-render extension -->
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="window.katexReady = true;"></script>

  <!-- Marked (Markdown → HTML) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Pyodide -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

  <style>
    /* ── Tokens ── */
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2e3145;
      --accent: #7c6af7;
      --accent2: #4fd6be;
      --text: #e2e4f0;
      --muted: #6b7099;
      --code-bg: #12141e;
      --run-bg: #7c6af7;
      --run-hover: #9585ff;
      --md-bg: #181b28;
      --radius: 10px;
      --font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
      --font-ui: "IBM Plex Sans", system-ui, sans-serif;
    }

    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 4rem;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      padding: 1.2rem 2rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    header h1 {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: .02em;
      color: var(--text);
      margin-right: auto;
    }

    header h1 span {
      color: var(--accent);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f5a623;
      box-shadow: 0 0 6px #f5a623;
      transition: background .4s, box-shadow .4s;
      flex-shrink: 0;
    }

    .status-dot.ready {
      background: var(--accent2);
      box-shadow: 0 0 6px var(--accent2);
    }

    /* ── Buttons ── */
    .btn {
      font-family: var(--font-ui);
      font-size: .8rem;
      font-weight: 500;
      padding: .4rem .9rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      cursor: pointer;
      background: var(--surface);
      color: var(--text);
      transition: background .15s, border-color .15s, color .15s;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--border);
      border-color: var(--accent);
      color: #fff;
    }

    .btn.primary {
      background: var(--run-bg);
      border-color: transparent;
      color: #fff;
    }

    .btn.primary:hover {
      background: var(--run-hover);
    }

    .btn.sm {
      font-size: .72rem;
      padding: .28rem .65rem;
    }

    /* ── File input ── */
    .file-label {
      font-size: .8rem;
      padding: .4rem .9rem;
      border-radius: 6px;
      border: 1px dashed var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }

    .file-label:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    #loadFile {
      display: none;
    }

    /* ── Notebook container ── */
    #notebook {
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    /* ── Cell ── */
    .cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .2s;
      position: relative;
    }

    .cell:focus-within {
      border-color: var(--accent);
    }

    .cell.dragging {
      opacity: .45;
      border: 2px dashed var(--accent);
    }

    /* Cell type badge */
    .cell-header {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .55rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--code-bg);
    }

    .cell-type {
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .cell-header .spacer {
      flex: 1;
    }

    /* Drag handle */
    .drag-handle {
      cursor: grab;
      color: var(--border);
      font-size: 1rem;
      line-height: 1;
      user-select: none;
      padding: 0 .2rem;
      transition: color .15s;
    }

    .drag-handle:hover {
      color: var(--muted);
    }

    /* ── Textarea (code / markdown source) ── */
    textarea {
      display: block;
      width: 100%;
      background: var(--code-bg);
      color: #c9d1e8;
      font-family: var(--font-mono);
      font-size: 13.5px;
      line-height: 1.65;
      padding: .9rem 1.1rem;
      border: none;
      resize: vertical;
      outline: none;
      min-height: 80px;
    }

    /* ── Output area ── */
    .output-wrap {
      border-top: 1px solid var(--border);
    }

    pre.output {
      background: #0b0d14;
      color: #a8ffb0;
      font-family: var(--font-mono);
      font-size: 12.5px;
      padding: .8rem 1.1rem;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 28px;
    }

    pre.output.err {
      color: #ff8080;
    }

    .output-img {
      display: block;
      max-width: 100%;
      margin: 0 auto;
      border-top: 1px solid var(--border);
    }

    /* ── Markdown output ── */
    .md-output {
      padding: 1.1rem 1.4rem;
      background: var(--md-bg);
      line-height: 1.75;
      color: var(--text);
      border-top: 1px solid var(--border);
    }

    .md-output h1,
    .md-output h2,
    .md-output h3 {
      color: #fff;
      margin: .9rem 0 .4rem;
    }

    .md-output h1 {
      font-size: 1.4rem;
    }

    .md-output h2 {
      font-size: 1.15rem;
    }

    .md-output h3 {
      font-size: 1rem;
    }

    .md-output p {
      margin: .4rem 0;
    }

    .md-output code {
      background: #252840;
      padding: .1em .35em;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: .88em;
    }

    .md-output pre {
      background: #252840;
      padding: .7rem 1rem;
      border-radius: 6px;
      overflow-x: auto;
    }

    .md-output pre code {
      background: none;
      padding: 0;
    }

    .md-output a {
      color: var(--accent2);
    }

    .md-output ul,
    .md-output ol {
      padding-left: 1.4rem;
    }

    /* KaTeX display blocks */
    .md-output .katex-display {
      overflow-x: auto;
      padding: .4rem 0;
    }

    /* ── Collapsed state ── */
    .output-wrap.collapsed {
      display: none;
    }
  </style>
</head>

<body>

  <header>
    <div class="status-dot" id="statusDot" title="Python runtime status"></div>
    <h1>⌁ <span>Py</span>Notebook</h1>
    <button class="btn" onclick="addCodeCell()">＋ Code</button>
    <button class="btn" onclick="addMarkdownCell()">＋ Markdown</button>
    <button class="btn" onclick="saveNotebook()">↓ Save .ipynb</button>
    <label class="file-label" for="loadFile">↑ Load .ipynb</label>
    <input type="file" id="loadFile" accept=".ipynb">
  </header>

  <div id="notebook"></div>

  <script>
    /* ───────────────────────────────────────────────
       KaTeX auto-render — waits for the deferred script
    ─────────────────────────────────────────────── */
    function renderMath(container) {
      // Poll until the auto-render extension is available
      function attempt(tries) {
        if (typeof renderMathInElement === 'function') {
          renderMathInElement(container, {
            delimiters: [
              { left: '$$', right: '$$', display: true },
              { left: '\\[', right: '\\]', display: true },
              { left: '$', right: '$', display: false },
              { left: '\\(', right: '\\)', display: false }
            ],
            throwOnError: false
          });
        } else if (tries > 0) {
          setTimeout(() => attempt(tries - 1), 150);
        }
      }
      attempt(30); // up to ~4.5 s of polling
    }

    /* ───────────────────────────────────────────────
       Pyodide
    ─────────────────────────────────────────────── */
    let pyodideReady = false;
    let pyodide;

    async function ensurePyodide() {
      if (pyodideReady) return;
      document.getElementById('statusDot').title = 'Loading…';
      pyodide = await loadPyodide();
      await pyodide.loadPackage(['matplotlib', 'numpy']);
      pyodideReady = true;
      document.getElementById('statusDot').classList.add('ready');
      document.getElementById('statusDot').title = 'Ready';
    }

    // Start loading in background immediately
    ensurePyodide();

    /* ───────────────────────────────────────────────
       Drag-and-drop
    ─────────────────────────────────────────────── */
    const nb = () => document.getElementById('notebook');

    function addDragEvents(cell) {
      const handle = cell.querySelector('.drag-handle');
      handle.addEventListener('mousedown', () => { cell.draggable = true; });
      cell.addEventListener('dragend', () => {
        cell.classList.remove('dragging');
        cell.draggable = false;
      });
      cell.addEventListener('dragstart', () => cell.classList.add('dragging'));

      nb().addEventListener('dragover', e => {
        e.preventDefault();
        const dragging = document.querySelector('.cell.dragging');
        if (!dragging) return;
        const after = getDragAfterElement(nb(), e.clientY);
        if (after == null) nb().appendChild(dragging);
        else nb().insertBefore(dragging, after);
      });
    }

    function getDragAfterElement(container, y) {
      const els = [...container.querySelectorAll('.cell:not(.dragging)')];
      return els.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - (box.top + box.height / 2);
        if (offset < 0 && offset > closest.offset) return { offset, element: child };
        return closest;
      }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    /* ───────────────────────────────────────────────
       Helpers
    ─────────────────────────────────────────────── */
    function makeBtn(label, cls, onclick) {
      const b = document.createElement('button');
      b.textContent = label;
      b.className = 'btn sm ' + (cls || '');
      b.onclick = onclick;
      return b;
    }

    /* ───────────────────────────────────────────────
       Code cell
    ─────────────────────────────────────────────── */
    function addCodeCell(initialCode = 'import numpy as np\nimport matplotlib.pyplot as plt\n\nx = np.linspace(0, 2*np.pi, 200)\nplt.plot(x, np.sin(x))\nplt.title("sin(x)")\nplt.tight_layout()') {
      const cell = document.createElement('div');
      cell.className = 'cell';

      // Header
      const hdr = document.createElement('div');
      hdr.className = 'cell-header';
      const badge = document.createElement('span');
      badge.className = 'cell-type';
      badge.textContent = 'python';
      const drag = document.createElement('span');
      drag.className = 'drag-handle';
      drag.textContent = '⠿';
      drag.title = 'Drag to reorder';
      const spacer = document.createElement('span');
      spacer.className = 'spacer';
      const runBtn = makeBtn('▶ Run', 'primary', run);
      const colBtn = makeBtn('Hide output', '', toggle);
      const delBtn = makeBtn('✕', '', () => cell.remove());
      hdr.append(drag, badge, spacer, runBtn, colBtn, delBtn);

      // Textarea
      const ta = document.createElement('textarea');
      ta.value = initialCode;
      ta.rows = Math.max(4, initialCode.split('\n').length);
      ta.spellcheck = false;
      ta.addEventListener('keydown', e => {
        if (e.shiftKey && e.key === 'Enter') { e.preventDefault(); run(); }
      });

      // Output
      const outputWrap = document.createElement('div');
      outputWrap.className = 'output-wrap';
      const pre = document.createElement('pre');
      pre.className = 'output';
      const img = document.createElement('img');
      img.className = 'output-img';
      outputWrap.append(pre, img);

      cell.append(hdr, ta, outputWrap);
      addDragEvents(cell);
      nb().appendChild(cell);

      function toggle() {
        const hidden = outputWrap.classList.toggle('collapsed');
        colBtn.textContent = hidden ? 'Show output' : 'Hide output';
      }

      async function run() {
        await ensurePyodide();
        pre.className = 'output';
        pre.textContent = '⏳ Running…';
        img.src = '';

        const code = ta.value;
        const fullCode = `
import io, base64, sys
from matplotlib import pyplot as plt

_out = io.StringIO()
sys.stdout = _out
sys.stderr = _out

try:
${code.split('\n').map(l => '    ' + l).join('\n')}
except Exception as _e:
    import traceback
    print(traceback.format_exc())

sys.stdout = sys.__stdout__
sys.stderr = sys.__stderr__

plt.tight_layout()
_buf = io.BytesIO()
plt.savefig(_buf, format='png', bbox_inches='tight')
plt.close('all')
_buf.seek(0)
_img_b64 = base64.b64encode(_buf.read()).decode('utf-8')
(_out.getvalue(), _img_b64)
`;
        try {
          const [textOut, imgB64] = await pyodide.runPythonAsync(fullCode);
          pre.textContent = textOut || '';
          if (imgB64 && imgB64.length > 100) {
            img.src = 'data:image/png;base64,' + imgB64;
          } else {
            img.src = '';
          }
        } catch (err) {
          pre.className = 'output err';
          pre.textContent = String(err);
        }
      }

      return { cell, getCode: () => ta.value, type: 'code' };
    }

    /* ───────────────────────────────────────────────
       Markdown cell
    ─────────────────────────────────────────────── */
    function addMarkdownCell(initialText = '## Markdown + LaTeX\n\nInline math: $E = mc^2$\n\nDisplay math:\n\n$$\\int_{-\\infty}^{\\infty} e^{-x^2}\\,dx = \\sqrt{\\pi}$$\n\nYou can also write **bold**, *italic*, and `code`.') {
      const cell = document.createElement('div');
      cell.className = 'cell';

      // Header
      const hdr = document.createElement('div');
      hdr.className = 'cell-header';
      const badge = document.createElement('span');
      badge.className = 'cell-type';
      badge.textContent = 'markdown';
      const drag = document.createElement('span');
      drag.className = 'drag-handle';
      drag.textContent = '⠿';
      drag.title = 'Drag to reorder';
      const spacer = document.createElement('span');
      spacer.className = 'spacer';
      const renderBtn = makeBtn('▶ Render', 'primary', render);
      const editBtn = makeBtn('Edit', '', toggleEdit);
      const delBtn = makeBtn('✕', '', () => cell.remove());
      hdr.append(drag, badge, spacer, renderBtn, editBtn, delBtn);

      // Textarea
      const ta = document.createElement('textarea');
      ta.value = initialText;
      ta.rows = Math.max(4, initialText.split('\n').length);
      ta.spellcheck = false;
      ta.addEventListener('keydown', e => {
        if (e.shiftKey && e.key === 'Enter') { e.preventDefault(); render(); }
      });

      // Output
      const mdOut = document.createElement('div');
      mdOut.className = 'md-output';

      cell.append(hdr, ta, mdOut);
      addDragEvents(cell);
      nb().appendChild(cell);

      let editing = true;

      function render() {
        // 1. Parse markdown
        mdOut.innerHTML = marked.parse(ta.value);
        // 2. Render math via KaTeX auto-render
        renderMath(mdOut);
        // 3. Switch to rendered view
        ta.style.display = 'none';
        mdOut.style.display = '';
        editBtn.textContent = 'Edit';
        editing = false;
      }

      function toggleEdit() {
        if (!editing) {
          ta.style.display = '';
          mdOut.style.display = 'none';
          editBtn.textContent = 'Preview';
          editing = true;
        } else {
          render();
        }
      }

      return { cell, getText: () => ta.value, type: 'markdown' };
    }

    /* ───────────────────────────────────────────────
       Save / Load
    ─────────────────────────────────────────────── */
    function saveNotebook() {
      const cells = [...document.querySelectorAll('#notebook .cell')];
      const nbJson = { cells: [], metadata: {}, nbformat: 4, nbformat_minor: 5 };
      cells.forEach(cell => {
        const ta = cell.querySelector('textarea');
        if (!ta) return;
        const src = ta.value.split('\n').map(l => l + '\n');
        if (cell.querySelector('pre.output')) {
          nbJson.cells.push({ cell_type: 'code', execution_count: null, metadata: {}, outputs: [], source: src });
        } else {
          nbJson.cells.push({ cell_type: 'markdown', metadata: {}, source: src });
        }
      });
      const blob = new Blob([JSON.stringify(nbJson, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'notebook.ipynb'; a.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById('loadFile').addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const parsed = JSON.parse(ev.target.result);
          document.getElementById('notebook').innerHTML = '';
          parsed.cells.forEach(c => {
            const src = Array.isArray(c.source) ? c.source.join('') : c.source;
            if (c.cell_type === 'code') addCodeCell(src);
            else if (c.cell_type === 'markdown') addMarkdownCell(src);
          });
        } catch { alert('Invalid .ipynb file'); }
      };
      reader.readAsText(file);
    });

    /* ───────────────────────────────────────────────
       Initial cells
    ─────────────────────────────────────────────── */
    addMarkdownCell();
    addCodeCell();
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Pattern Mapper</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Styles -->
    <!-- <link rel="stylesheet" href="_RoutPlanner_style.css"> -->


    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap');

        :root {
            --primary: #000;
            --bg: #fff;
            --text: #1a1a1a;
            --border: #000;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1,
        h2,
        h3,
        h4,
        h5 {
            font-family: 'Bodoni Moda', serif;
            font-weight: 700;
            color: #000;
        }

        header {
            padding: 1.5rem 2rem;
            background: #fff;
            border-bottom: 4px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .header-left h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: -1px;
            line-height: 1;
        }

        .header-left p {
            margin: 0;
            font-size: 0.9rem;
            opacity: 0.8;
            font-weight: 600;
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .controls {
            width: 350px;
            padding: 2rem;
            border-right: 1px solid var(--border);
            background: #fff;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            overflow-y: auto;
        }

        .control-group h3 {
            margin-top: 0;
            font-size: 1.3rem;
            margin-bottom: 1rem;
            position: relative;
            padding-bottom: 0.5rem;
        }

        .control-group h3::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 30px;
            height: 3px;
            background: #000;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        input,
        select,
        button {
            background: #fff;
            border: 1px solid var(--border);
            color: #000;
            padding: 0.85rem;
            border-radius: 0;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
        }

        input:focus,
        select:focus {
            outline: none;
            box-shadow: 0 0 0 2px #000;
        }

        button {
            background: var(--primary);
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #fff;
            color: #000;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #ccc;
            color: #666;
            border-color: #ccc;
        }

        .status-bar {
            padding: 0.75rem 1rem;
            border-radius: 0;
            font-size: 0.85rem;
            font-weight: 600;
            background: #fff;
            min-width: 400px;
            height: 80px;
            text-align: left;
            border: 1px solid #000;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.25rem;
        }

        .hint-text {
            color: blue;
            font-weight: 700;
        }

        .log-text {
            color: #000;
        }

        .status-bar.info {
            border-right: 4px solid #000;
        }

        .status-bar.success {
            border-right: 4px solid #10b981;
        }

        .status-bar.error {
            border-right: 4px solid #ef4444;
        }

        .display-area {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            background: #f0f0f0;
        }

        #map {
            flex: 1;
            width: 100%;
        }

        .preview-panel {
            height: 220px;
            background: #fff;
            display: flex;
            gap: 2rem;
            padding: 1.5rem;
            border-top: 4px solid var(--border);
            justify-content: center;
        }

        canvas {
            max-height: 100%;
            max-width: 45%;
            object-fit: contain;
            background: #fafafa;
            border: 1px solid #000;
        }

        .slider-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .slider-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .slider-item label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .slider-item span {
            font-size: 0.85rem;
            color: #000;
            font-weight: 700;
            text-align: right;
            border-bottom: 1px solid #000;
            padding-bottom: 2px;
        }

        input[type="range"] {
            accent-color: #000;
            padding: 0;
            border: none;
            height: 2px;
            background: #ccc;
            cursor: pointer;
        }
    </style>

</head>

<body>
    <header>
        <div class="header-left">
            <h1>Route Pattern Mapper</h1>
            <p>Converts a pattern image to GPS routes and exports to GPX files.</p>
        </div>
        <div class="header-right">
            <div id="status-bar" class="status-bar">
                <div id="status-hint" class="hint-text">hint: Enter location(s) using ';' for multiple cities, then
                    Download</div>
                <div id="status-log" class="log-text">>> Ready</div>
            </div>
        </div>
    </header>


    <main>
        <aside class="controls">
            <section class="control-group">
                <h3>1. Choose Location</h3>
                <div class="input-wrapper">
                    <input type="text" id="place_name" placeholder="Vancouver, BC; Burnaby, BC"
                        value="Vancouver, BC, Canada">
                    <select id="network_type">
                        <option value="bike">Bike</option>
                        <option value="walk">Walk</option>
                        <option value="drive">Drive</option>
                    </select>
                </div>
                <button id="btn-fetch-map">Download Street Network</button>
            </section>

            <section class="control-group">
                <h3>2. Pattern Image</h3>
                <div class="input-wrapper">
                    <input type="file" id="image_input" accept="image/*">
                </div>
                <button id="btn-process-image" disabled>Pattern Image</button>
            </section>



            <section class="control-group">
                <h3>3. Adjust Overlay</h3>
                <div class="slider-grid">
                    <div class="slider-item">
                        <label>Scale</label>
                        <input type="range" id="scale" min="0.01" max="1" step="0.01" value="0.5">
                        <span id="val-scale">0.50</span>
                    </div>
                    <div class="slider-item">
                        <label>Offset X</label>
                        <input type="range" id="offset_x" min="-0.5" max="0.5" step="0.01" value="0.1">
                        <span id="val-offset-x">0.10</span>
                    </div>
                    <div class="slider-item">
                        <label>Offset Y</label>
                        <input type="range" id="offset_y" min="-0.5" max="0.5" step="0.01" value="0.1">
                        <span id="val-offset-y">0.10</span>
                    </div>
                </div>
                <div class="input-wrapper">
                    <label>Outermost Color (Anchor)</label>
                    <select id="anchor_color">
                        <option value="">Auto</option>
                    </select>
                </div>
            </section>

            <section class="control-group">
                <h3>4. Match & Export</h3>
                <button id="btn-snap-route" disabled style="margin-bottom: 0.5rem;">Match to known ways?</button>
                <button id="btn-export-gpx" disabled>Export GPX Files</button>
            </section>
        </aside>

        <section class="display-area">
            <div id="map"></div>
            <div class="preview-panel">
                <canvas id="canvas_original" title="Original Image"></canvas>
                <canvas id="canvas_mask" title="Color Masks / Routes"></canvas>
            </div>
        </section>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Define OpenCV Callback Before Loading -->
    <script>
        function onOpenCvReady() {
            window.cvLoaded = true;
            if (window.initCvApp) window.initCvApp();
        }
    </script>
    <!-- OpenCV.js -->
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="onOpenCvReady();"></script>
    <!-- App Logic -->
    <script src="RoutPlanner_app.js"></script>
</body>

</html>
